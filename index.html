<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoleMate &mdash; ChemKit</title>
  <meta name="description" content="MoleMate is a ChemKit calculator for converting mass and molar mass into moles and estimated particles.">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%231f5eff'/%3E%3Cstop offset='100%25' stop-color='%2326c6da'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='32' cy='32' r='22' fill='none' stroke='url(%23g)' stroke-width='4'/%3E%3Ccircle cx='32' cy='18' r='6' fill='url(%23g)'/%3E%3Ccircle cx='18' cy='40' r='6' fill='url(%23g)'/%3E%3Ccircle cx='46' cy='40' r='6' fill='url(%23g)'/%3E%3Cpath d='M23 36l9-12 9 12' fill='none' stroke='%231f5eff' stroke-width='3.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%231f5eff'/%3E%3Cstop offset='100%25' stop-color='%2326c6da'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='32' cy='32' r='22' fill='none' stroke='url(%23g)' stroke-width='4'/%3E%3Ccircle cx='32' cy='18' r='6' fill='url(%23g)'/%3E%3Ccircle cx='18' cy='40' r='6' fill='url(%23g)'/%3E%3Ccircle cx='46' cy='40' r='6' fill='url(%23g)'/%3E%3Cpath d='M23 36l9-12 9 12' fill='none' stroke='%231f5eff' stroke-width='3.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
  <div class="top-container">
    <a class="top-link top-link-primary" href="https://chemkit.vercel.app/">
      <i class="fas fa-house"></i> Back to ChemKit
    </a>
    <button class="top-link" onclick="toggleTheme()">
      <i class="fas fa-adjust"></i> Toggle Theme
    </button>
    <button class="top-link" id="clearHistoryButton">
      <i class="fas fa-trash"></i> Clear History
    </button>
  </div>
  <div class="container">
    <h1>MoleMate</h1>
    <span class="mini-badge">ChemKit Mini Tool</span>
    <p class="subtitle">Convert mass and molar mass into moles and particles.</p>
    <p class="formula-helper">Formula: moles = mass &divide; molar mass</p>
    <label for="mass">Mass:</label>
    <div class="input-row">
      <input type="number" id="mass" placeholder="Enter mass in grams" required min="0" step="any" inputmode="decimal">
      <select id="massUnit" aria-label="Mass unit">
        <option value="mg">mg</option>
        <option value="g" selected>g</option>
        <option value="kg">kg</option>
      </select>
    </div>

    <label for="molarMass">Molar Mass (g/mol):</label>
    <input type="number" id="molarMass" placeholder="Enter molar mass in g/mol" required min="0" step="any" inputmode="decimal">

    <div>
      <button id="calculateButton">
        <i class="fas fa-calculator"></i> Calculate Moles
      </button>
      <button onclick="clearFields()">
        <i class="fas fa-eraser"></i> Clear
      </button>
    </div>

    <div class="form-message" id="formMessage" aria-live="polite"></div>
    <div class="result" id="result"></div>
  </div>
  <script src="script.js"></script>
</body>

</html>
